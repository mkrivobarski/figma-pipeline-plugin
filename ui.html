<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 11px;
      background: var(--figma-color-bg, #1e1e1e);
      color: var(--figma-color-text, rgba(255,255,255,0.9));
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      user-select: none;
    }

    /* ── Bridge status bar ───────────────────────────────────────────────── */
    .bridge-bar {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px;
      background: var(--figma-color-bg-secondary, #2c2c2c);
      border-bottom: 1px solid var(--figma-color-border, #3c3c3c);
    }

    .status-indicator {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-indicator.loading {
      background: #f5a623;
      animation: pulse 1.5s ease-in-out infinite;
    }

    .status-indicator.active {
      background: #18a957;
      box-shadow: 0 0 5px rgba(24,169,87,0.6);
      animation: glow 2s ease-in-out infinite;
    }

    .status-indicator.error { background: #f24822; }

    @keyframes pulse { 0%,100% { opacity:0.4; } 50% { opacity:1; } }
    @keyframes glow {
      0%,100% { box-shadow: 0 0 4px rgba(24,169,87,0.4); }
      50%      { box-shadow: 0 0 8px rgba(24,169,87,0.8); }
    }

    .bridge-label { color: var(--figma-color-text-secondary, rgba(255,255,255,0.45)); font-size: 10px; font-weight: 600; letter-spacing: 0.4px; text-transform: uppercase; }
    .bridge-state { color: var(--figma-color-text, rgba(255,255,255,0.85)); font-size: 10px; font-weight: 500; margin-left: 3px; }

    /* ── Pipeline panel ───────────────────────────────────────────────────── */
    .panel {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 9px;
    }

    /* ── Section label ────────────────────────────────────────────────────── */
    .label {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      color: var(--figma-color-text-secondary, rgba(255,255,255,0.4));
      margin-bottom: 3px;
    }

    /* ── Target box ───────────────────────────────────────────────────────── */
    .target-box {
      min-height: 34px;
      background: var(--figma-color-bg-secondary, #2c2c2c);
      border: 1px solid var(--figma-color-border, #3c3c3c);
      border-radius: 4px;
      padding: 5px 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .target-icon { font-size: 12px; flex-shrink: 0; line-height: 1; }
    .target-info { flex: 1; overflow: hidden; }
    .target-name { font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .target-meta { font-size: 9px; color: var(--figma-color-text-secondary, rgba(255,255,255,0.4)); margin-top: 1px; }
    .target-empty { font-size: 10px; color: var(--figma-color-text-secondary, rgba(255,255,255,0.32)); font-style: italic; }

    /* ── Intent pills ─────────────────────────────────────────────────────── */
    .intent-row { display: flex; gap: 4px; }

    .intent-btn {
      flex: 1;
      padding: 4px 2px;
      border: 1px solid var(--figma-color-border, #3c3c3c);
      border-radius: 4px;
      background: var(--figma-color-bg-secondary, #2c2c2c);
      color: var(--figma-color-text-secondary, rgba(255,255,255,0.5));
      font-family: inherit;
      font-size: 10px;
      cursor: pointer;
      text-align: center;
      transition: border-color 0.1s, color 0.1s, background 0.1s;
    }

    .intent-btn:hover { color: var(--figma-color-text, rgba(255,255,255,0.85)); }

    .intent-btn.active {
      background: #1e6fe0;
      border-color: #1e6fe0;
      color: #fff;
    }

    /* ── Inputs ───────────────────────────────────────────────────────────── */
    textarea, input[type=text] {
      width: 100%;
      background: var(--figma-color-bg-secondary, #2c2c2c);
      border: 1px solid var(--figma-color-border, #3c3c3c);
      border-radius: 4px;
      color: var(--figma-color-text, rgba(255,255,255,0.9));
      font-family: inherit;
      font-size: 11px;
      outline: none;
      transition: border-color 0.1s;
    }

    textarea { padding: 6px 8px; line-height: 1.45; resize: none; }
    input[type=text] { padding: 5px 8px; }
    textarea::placeholder, input[type=text]::placeholder { color: var(--figma-color-text-secondary, rgba(255,255,255,0.28)); }
    textarea:focus, input[type=text]:focus { border-color: #1e6fe0; }

    /* ── Buttons ──────────────────────────────────────────────────────────── */
    .btn-row { display: flex; gap: 6px; }

    .submit-btn {
      flex: 1;
      padding: 6px;
      background: #1e6fe0;
      border: none;
      border-radius: 4px;
      color: #fff;
      font-family: inherit;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.1s;
    }

    .submit-btn:hover:not(:disabled) { opacity: 0.85; }
    .submit-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    .cancel-btn {
      padding: 6px 11px;
      background: none;
      border: 1px solid var(--figma-color-border, #3c3c3c);
      border-radius: 4px;
      color: var(--figma-color-text-secondary, rgba(255,255,255,0.45));
      font-family: inherit;
      font-size: 11px;
      cursor: pointer;
      transition: color 0.1s, border-color 0.1s;
    }

    .cancel-btn:hover {
      color: var(--figma-color-text, rgba(255,255,255,0.8));
      border-color: var(--figma-color-text-secondary, rgba(255,255,255,0.3));
    }

    /* ── Toast ────────────────────────────────────────────────────────────── */
    .toast {
      font-size: 10px;
      padding: 5px 8px;
      border-radius: 4px;
      display: none;
    }

    .toast.success {
      background: rgba(24,169,87,0.12);
      border: 1px solid rgba(24,169,87,0.3);
      color: #18a957;
    }

    .toast.error {
      background: rgba(242,72,34,0.12);
      border: 1px solid rgba(242,72,34,0.3);
      color: #f24822;
    }

    /* ── Queue section ────────────────────────────────────────────────────── */
    .queue-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
    }

    .queue-toggle {
      font-size: 9px;
      color: var(--figma-color-text-secondary, rgba(255,255,255,0.35));
      background: none;
      border: none;
      font-family: inherit;
      cursor: pointer;
      padding: 0;
    }

    .queue-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-top: 4px;
    }

    .queue-item {
      background: var(--figma-color-bg-secondary, #2c2c2c);
      border: 1px solid var(--figma-color-border, #3c3c3c);
      border-radius: 4px;
      padding: 5px 8px;
      display: flex;
      align-items: flex-start;
      gap: 6px;
    }

    .queue-status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .queue-status-dot.pending    { background: #f5a623; }
    .queue-status-dot.processing { background: #1e6fe0; animation: pulse 1.2s infinite; }
    .queue-status-dot.done       { background: #18a957; }
    .queue-status-dot.failed     { background: #f24822; }

    .queue-item-info { flex: 1; overflow: hidden; }
    .queue-item-name { font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 10px; }
    .queue-item-meta { font-size: 9px; color: var(--figma-color-text-secondary, rgba(255,255,255,0.38)); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .queue-empty { font-size: 10px; color: var(--figma-color-text-secondary, rgba(255,255,255,0.32)); font-style: italic; text-align: center; padding: 6px 0; }

    /* ── Light theme ──────────────────────────────────────────────────────── */
    @media (prefers-color-scheme: light) {
      body { background: #f5f5f5; color: #1e1e1e; }
      .bridge-bar { background: #fff; border-color: #e5e5e5; }
      .bridge-label { color: #999; }
      .bridge-state { color: #333; }
      .target-box, textarea, input[type=text], .queue-item { background: #fff; border-color: #e5e5e5; }
      .target-name { color: #1e1e1e; }
      .label, .target-meta, .target-empty, .queue-empty { color: #999; }
      .intent-btn { background: #fff; border-color: #e5e5e5; color: #666; }
      textarea::placeholder, input[type=text]::placeholder { color: #bbb; }
      .cancel-btn { border-color: #e5e5e5; color: #999; }
      .cancel-btn:hover { color: #333; border-color: #ccc; }
      .queue-item-meta { color: #aaa; }
    }
  </style>
</head>
<body>

  <!-- MCP Bridge status bar -->
  <div class="bridge-bar">
    <div class="status-indicator loading" id="status-dot"></div>
    <span class="bridge-label">MCP</span>
    <span class="bridge-state" id="status-state">connecting</span>
  </div>

  <!-- Pipeline panel -->
  <div class="panel">

    <!-- Target -->
    <div>
      <div class="label">Target</div>
      <div class="target-box" id="target-box">
        <span class="target-empty" id="target-empty">Select a node in Figma</span>
        <span class="target-icon" id="target-icon" style="display:none"></span>
        <div class="target-info" id="target-info" style="display:none">
          <div class="target-name" id="target-name"></div>
          <div class="target-meta" id="target-meta"></div>
        </div>
      </div>
    </div>

    <!-- Intent -->
    <div>
      <div class="label">Intent</div>
      <div class="intent-row" id="intent-row">
        <button class="intent-btn active" data-intent="iterate">Iterate</button>
        <button class="intent-btn" data-intent="redesign">Redesign</button>
        <button class="intent-btn" data-intent="fix">Fix</button>
        <button class="intent-btn" data-intent="review">Review</button>
      </div>
    </div>

    <!-- Instructions -->
    <div>
      <div class="label">Instructions</div>
      <textarea id="instruction" rows="3" placeholder="Describe what you want to change…"></textarea>
    </div>

    <!-- Constraints -->
    <div>
      <div class="label">Constraints <span style="font-weight:400;text-transform:none;letter-spacing:0;font-size:10px">(optional)</span></div>
      <input type="text" id="constraints" placeholder="e.g. keep WCAG AA contrast" />
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- Buttons -->
    <div class="btn-row">
      <button class="cancel-btn" id="cancel-btn">Cancel</button>
      <button class="submit-btn" id="submit-btn" disabled>Submit</button>
    </div>

    <!-- Queue -->
    <div>
      <div class="queue-header" id="queue-header">
        <div class="label" style="margin-bottom:0">Queue</div>
        <button class="queue-toggle" id="queue-toggle">▾ hide</button>
      </div>
      <div class="queue-list" id="queue-list">
        <div class="queue-empty" id="queue-empty">No pending instructions</div>
      </div>
    </div>

  </div>

  <script>
    // ============================================================================
    // GLOBAL STATE - Data storage for Puppeteer/MCP access
    // ============================================================================
    window.__figmaVariablesData = null;
    window.__figmaVariablesReady = false;
    window.__figmaComponentData = null;
    window.__figmaComponentRequests = new Map();
    window.__figmaPendingRequests = new Map();

    let requestIdCounter = 0;

    // Bridge status helper
    function updateStatus(state, isActive, isError) {
      var dot = document.getElementById('status-dot');
      var stateText = document.getElementById('status-state');
      dot.className = 'status-indicator ' + (isError ? 'error' : (isActive ? 'active' : 'loading'));
      stateText.textContent = state;
    }

    // ============================================================================
    // COMMAND INFRASTRUCTURE - Generic plugin command sender
    // ============================================================================
    window.sendPluginCommand = (type, params, timeoutMs) => {
      timeoutMs = timeoutMs || 15000;
      return new Promise((resolve, reject) => {
        const requestId = type.toLowerCase() + '_' + (++requestIdCounter) + '_' + Date.now();

        const timeoutId = setTimeout(() => {
          if (window.__figmaPendingRequests.has(requestId)) {
            window.__figmaPendingRequests.delete(requestId);
            reject(new Error(type + ' request timed out after ' + timeoutMs + 'ms'));
          }
        }, timeoutMs);

        window.__figmaPendingRequests.set(requestId, { resolve: resolve, reject: reject, type: type, timeoutId: timeoutId });

        var message = { type: type, requestId: requestId };
        for (var key in params) {
          if (params.hasOwnProperty(key)) message[key] = params[key];
        }

        parent.postMessage({ pluginMessage: message }, '*');
        console.log('[MCP Bridge] Sent:', type);
      });
    };

    // ============================================================================
    // VARIABLE OPERATIONS
    // ============================================================================

    window.executeCode = (code, timeout) => {
      return window.sendPluginCommand('EXECUTE_CODE', { code: code, timeout: timeout || 5000 }, (timeout || 5000) + 2000)
        .catch(function(err) { return { success: false, error: err.message || String(err) }; });
    };

    window.updateVariable = (variableId, modeId, value) => {
      return window.sendPluginCommand('UPDATE_VARIABLE', { variableId: variableId, modeId: modeId, value: value })
        .catch(function(err) { return { success: false, error: err.message || String(err) }; });
    };

    window.createVariable = (name, collectionId, resolvedType, options) => {
      var params = { name: name, collectionId: collectionId, resolvedType: resolvedType };
      if (options) {
        if (options.valuesByMode) params.valuesByMode = options.valuesByMode;
        if (options.description) params.description = options.description;
        if (options.scopes) params.scopes = options.scopes;
      }
      return window.sendPluginCommand('CREATE_VARIABLE', params)
        .catch(function(err) { return { success: false, error: err.message || String(err) }; });
    };

    window.createVariableCollection = (name, options) => {
      var params = { name: name };
      if (options) {
        if (options.initialModeName) params.initialModeName = options.initialModeName;
        if (options.additionalModes) params.additionalModes = options.additionalModes;
      }
      return window.sendPluginCommand('CREATE_VARIABLE_COLLECTION', params)
        .catch(function(err) { return { success: false, error: err.message || String(err) }; });
    };

    window.deleteVariable = (variableId) => {
      return window.sendPluginCommand('DELETE_VARIABLE', { variableId: variableId })
        .catch(function(err) { return { success: false, error: err.message || String(err) }; });
    };

    window.deleteVariableCollection = (collectionId) => {
      return window.sendPluginCommand('DELETE_VARIABLE_COLLECTION', { collectionId: collectionId })
        .catch(function(err) { return { success: false, error: err.message || String(err) }; });
    };

    window.renameVariable = (variableId, newName) => {
      return window.sendPluginCommand('RENAME_VARIABLE', { variableId: variableId, newName: newName })
        .catch(function(err) { return { success: false, error: err.message || String(err) }; });
    };

    window.setVariableDescription = (variableId, description) => {
      return window.sendPluginCommand('SET_VARIABLE_DESCRIPTION', { variableId: variableId, description: description })
        .catch(function(err) { return { success: false, error: err.message || String(err) }; });
    };

    window.addMode = (collectionId, modeName) => {
      return window.sendPluginCommand('ADD_MODE', { collectionId: collectionId, modeName: modeName })
        .catch(function(err) { return { success: false, error: err.message || String(err) }; });
    };

    window.renameMode = (collectionId, modeId, newName) => {
      return window.sendPluginCommand('RENAME_MODE', { collectionId: collectionId, modeId: modeId, newName: newName })
        .catch(function(err) { return { success: false, error: err.message || String(err) }; });
    };

    window.refreshVariables = () => {
      return window.sendPluginCommand('REFRESH_VARIABLES', {}, 300000)
        .catch(function(err) { return { success: false, error: err.message || String(err) }; });
    };

    // ============================================================================
    // COMPONENT OPERATIONS
    // ============================================================================

    window.getLocalComponents = () => {
      return window.sendPluginCommand('GET_LOCAL_COMPONENTS', {}, 300000)
        .catch(function(err) { return { success: false, error: err.message || String(err) }; });
    };

    window.instantiateComponent = (componentKey, options) => {
      var params = { componentKey: componentKey };
      if (options) {
        if (options.nodeId) params.nodeId = options.nodeId;
        if (options.position) params.position = options.position;
        if (options.size) params.size = options.size;
        if (options.overrides) params.overrides = options.overrides;
        if (options.variant) params.variant = options.variant;
        if (options.parentId) params.parentId = options.parentId;
      }
      return window.sendPluginCommand('INSTANTIATE_COMPONENT', params)
        .catch(function(err) { return { success: false, error: err.message || String(err) }; });
    };

    window.requestComponentData = (nodeId) => {
      return new Promise((resolve, reject) => {
        const requestId = 'component_' + (++requestIdCounter) + '_' + Date.now();
        window.__figmaComponentRequests.set(requestId, { resolve: resolve, reject: reject });
        parent.postMessage({ pluginMessage: { type: 'GET_COMPONENT', requestId: requestId, nodeId: nodeId } }, '*');
        setTimeout(() => {
          if (window.__figmaComponentRequests.has(requestId)) {
            window.__figmaComponentRequests.delete(requestId);
            reject(new Error('Component request timed out'));
          }
        }, 10000);
      });
    };

    // ============================================================================
    // COMPONENT PROPERTY MANAGEMENT
    // ============================================================================

    window.setNodeDescription = (nodeId, description, descriptionMarkdown) => {
      return window.sendPluginCommand('SET_NODE_DESCRIPTION', {
        nodeId: nodeId, description: description, descriptionMarkdown: descriptionMarkdown
      }).catch(function(err) { return { success: false, error: err.message || String(err) }; });
    };

    window.addComponentProperty = (nodeId, propertyName, type, defaultValue, options) => {
      var params = { nodeId: nodeId, propertyName: propertyName, propertyType: type, defaultValue: defaultValue };
      if (options && options.preferredValues) params.preferredValues = options.preferredValues;
      return window.sendPluginCommand('ADD_COMPONENT_PROPERTY', params)
        .catch(function(err) { return { success: false, error: err.message || String(err) }; });
    };

    window.editComponentProperty = (nodeId, propertyName, newValue) => {
      return window.sendPluginCommand('EDIT_COMPONENT_PROPERTY', {
        nodeId: nodeId, propertyName: propertyName, newValue: newValue
      }).catch(function(err) { return { success: false, error: err.message || String(err) }; });
    };

    window.deleteComponentProperty = (nodeId, propertyName) => {
      return window.sendPluginCommand('DELETE_COMPONENT_PROPERTY', {
        nodeId: nodeId, propertyName: propertyName
      }).catch(function(err) { return { success: false, error: err.message || String(err) }; });
    };

    // ============================================================================
    // NODE MANIPULATION
    // ============================================================================

    window.resizeNode = (nodeId, width, height, withConstraints) => {
      return window.sendPluginCommand('RESIZE_NODE', {
        nodeId: nodeId, width: width, height: height, withConstraints: withConstraints !== false
      }).catch(function(err) { return { success: false, error: err.message || String(err) }; });
    };

    window.moveNode = (nodeId, x, y) => {
      return window.sendPluginCommand('MOVE_NODE', { nodeId: nodeId, x: x, y: y })
        .catch(function(err) { return { success: false, error: err.message || String(err) }; });
    };

    window.setNodeFills = (nodeId, fills) => {
      return window.sendPluginCommand('SET_NODE_FILLS', { nodeId: nodeId, fills: fills })
        .catch(function(err) { return { success: false, error: err.message || String(err) }; });
    };

    window.setNodeStrokes = (nodeId, strokes, strokeWeight) => {
      var params = { nodeId: nodeId, strokes: strokes };
      if (strokeWeight !== undefined) params.strokeWeight = strokeWeight;
      return window.sendPluginCommand('SET_NODE_STROKES', params)
        .catch(function(err) { return { success: false, error: err.message || String(err) }; });
    };

    window.setNodeOpacity = (nodeId, opacity) => {
      return window.sendPluginCommand('SET_NODE_OPACITY', { nodeId: nodeId, opacity: opacity })
        .catch(function(err) { return { success: false, error: err.message || String(err) }; });
    };

    window.setNodeCornerRadius = (nodeId, radius) => {
      return window.sendPluginCommand('SET_NODE_CORNER_RADIUS', { nodeId: nodeId, radius: radius })
        .catch(function(err) { return { success: false, error: err.message || String(err) }; });
    };

    window.cloneNode = (nodeId) => {
      return window.sendPluginCommand('CLONE_NODE', { nodeId: nodeId })
        .catch(function(err) { return { success: false, error: err.message || String(err) }; });
    };

    window.deleteNode = (nodeId) => {
      return window.sendPluginCommand('DELETE_NODE', { nodeId: nodeId })
        .catch(function(err) { return { success: false, error: err.message || String(err) }; });
    };

    window.renameNode = (nodeId, newName) => {
      return window.sendPluginCommand('RENAME_NODE', { nodeId: nodeId, newName: newName })
        .catch(function(err) { return { success: false, error: err.message || String(err) }; });
    };

    window.setTextContent = (nodeId, text, options) => {
      var params = { nodeId: nodeId, text: text };
      if (options) {
        if (options.fontSize) params.fontSize = options.fontSize;
        if (options.fontWeight) params.fontWeight = options.fontWeight;
        if (options.fontFamily) params.fontFamily = options.fontFamily;
      }
      return window.sendPluginCommand('SET_TEXT_CONTENT', params)
        .catch(function(err) { return { success: false, error: err.message || String(err) }; });
    };

    window.createChildNode = (parentId, nodeType, properties) => {
      return window.sendPluginCommand('CREATE_CHILD_NODE', {
        parentId: parentId, nodeType: nodeType, properties: properties || {}
      }).catch(function(err) { return { success: false, error: err.message || String(err) }; });
    };

    // ============================================================================
    // SCREENSHOT & INSTANCE PROPERTIES
    // ============================================================================

    window.captureScreenshot = (nodeId, options) => {
      var params = { nodeId: nodeId };
      if (options) {
        if (options.format) params.format = options.format;
        if (options.scale) params.scale = options.scale;
      }
      return window.sendPluginCommand('CAPTURE_SCREENSHOT', params, 30000)
        .catch(function(err) { return { success: false, error: err.message || String(err) }; });
    };

    window.setInstanceProperties = (nodeId, properties) => {
      return window.sendPluginCommand('SET_INSTANCE_PROPERTIES', {
        nodeId: nodeId, properties: properties
      }).catch(function(err) { return { success: false, error: err.message || String(err) }; });
    };

    // ============================================================================
    // WEBSOCKET BRIDGE CLIENT
    // ============================================================================
    (function() {
      var WS_PORT_RANGE_START = 9223;
      var WS_PORT_RANGE_END = 9232;

      var activeConnections = [];
      var wsReconnectDelay = 500;
      var wsMaxReconnectDelay = 5000;
      var wsReconnectAttempts = 0;
      var wsMaxReconnectAttempts = 50;
      var isScanning = false;

      var ws = null;
      var wsPort = null;
      var wsConnected = false;

      var methodMap = {
        'EXECUTE_CODE': function(params) { return window.executeCode(params.code, params.timeout); },
        'UPDATE_VARIABLE': function(params) { return window.updateVariable(params.variableId, params.modeId, params.value); },
        'CREATE_VARIABLE': function(params) { return window.createVariable(params.name, params.collectionId, params.resolvedType, params); },
        'DELETE_VARIABLE': function(params) { return window.deleteVariable(params.variableId); },
        'DELETE_VARIABLE_COLLECTION': function(params) { return window.deleteVariableCollection(params.collectionId); },
        'RENAME_VARIABLE': function(params) { return window.renameVariable(params.variableId, params.newName); },
        'SET_VARIABLE_DESCRIPTION': function(params) { return window.setVariableDescription(params.variableId, params.description); },
        'ADD_MODE': function(params) { return window.addMode(params.collectionId, params.modeName); },
        'RENAME_MODE': function(params) { return window.renameMode(params.collectionId, params.modeId, params.newName); },
        'REFRESH_VARIABLES': function() { return window.refreshVariables(); },
        'CREATE_VARIABLE_COLLECTION': function(params) { return window.createVariableCollection(params.name, params); },
        'GET_LOCAL_COMPONENTS': function() { return window.getLocalComponents(); },
        'INSTANTIATE_COMPONENT': function(params) { return window.instantiateComponent(params.componentKey, params); },
        'GET_COMPONENT': function(params) { return window.requestComponentData(params.nodeId); },
        'SET_NODE_DESCRIPTION': function(params) { return window.setNodeDescription(params.nodeId, params.description, params.descriptionMarkdown); },
        'ADD_COMPONENT_PROPERTY': function(params) { return window.addComponentProperty(params.nodeId, params.propertyName, params.propertyType, params.defaultValue, params); },
        'EDIT_COMPONENT_PROPERTY': function(params) { return window.editComponentProperty(params.nodeId, params.propertyName, params.newValue); },
        'DELETE_COMPONENT_PROPERTY': function(params) { return window.deleteComponentProperty(params.nodeId, params.propertyName); },
        'RESIZE_NODE': function(params) { return window.resizeNode(params.nodeId, params.width, params.height, params.withConstraints); },
        'MOVE_NODE': function(params) { return window.moveNode(params.nodeId, params.x, params.y); },
        'SET_NODE_FILLS': function(params) { return window.setNodeFills(params.nodeId, params.fills); },
        'SET_NODE_STROKES': function(params) { return window.setNodeStrokes(params.nodeId, params.strokes, params.strokeWeight); },
        'SET_NODE_OPACITY': function(params) { return window.setNodeOpacity(params.nodeId, params.opacity); },
        'SET_NODE_CORNER_RADIUS': function(params) { return window.setNodeCornerRadius(params.nodeId, params.radius); },
        'CLONE_NODE': function(params) { return window.cloneNode(params.nodeId); },
        'DELETE_NODE': function(params) { return window.deleteNode(params.nodeId); },
        'RENAME_NODE': function(params) { return window.renameNode(params.nodeId, params.newName); },
        'SET_TEXT_CONTENT': function(params) { return window.setTextContent(params.nodeId, params.text, params); },
        'CREATE_CHILD_NODE': function(params) { return window.createChildNode(params.parentId, params.nodeType, params.properties); },
        'CAPTURE_SCREENSHOT': function(params) { return window.captureScreenshot(params.nodeId, params); },
        'SET_INSTANCE_PROPERTIES': function(params) { return window.setInstanceProperties(params.nodeId, params.properties); },
        'GET_VARIABLES_DATA': function() {
          if (window.__figmaVariablesReady && window.__figmaVariablesData) {
            return Promise.resolve(window.__figmaVariablesData);
          }
          return Promise.reject(new Error('Variables data not ready. Make sure the Desktop Bridge plugin has loaded.'));
        },
        'GET_FILE_INFO': function() { return window.sendPluginCommand('GET_FILE_INFO', {}); },
        'CLEAR_CONSOLE': function() { return Promise.resolve({ cleared: true }); },
        'RELOAD_UI': function() { return window.sendPluginCommand('RELOAD_UI', {}); }
      };

      function isPortConnected(port) {
        for (var i = 0; i < activeConnections.length; i++) {
          if (activeConnections[i].port === port && activeConnections[i].ws.readyState === 1) return true;
        }
        return false;
      }

      function removeConnection(port) {
        activeConnections = activeConnections.filter(function(c) { return c.port !== port; });
        updateCompatState();
      }

      function updateCompatState() {
        var live = activeConnections.filter(function(c) { return c.ws.readyState === 1; });
        wsConnected = live.length > 0;
        if (live.length > 0) { ws = live[0].ws; wsPort = live[0].port; }
        else { ws = null; wsPort = null; }
      }

      function initializeConnection(connWs, port) {
        if (window.__figmaVariablesReady && window.__figmaVariablesData) {
          connWs.send(JSON.stringify({ type: 'VARIABLES_DATA', data: window.__figmaVariablesData }));
        }
        window.sendPluginCommand('GET_FILE_INFO', {})
          .then(function(info) {
            if (connWs.readyState === 1 && info && info.success !== false) {
              connWs.send(JSON.stringify({ type: 'FILE_INFO', data: info.fileInfo || info }));
            }
          })
          .catch(function() {});
      }

      var initialScanAttempts = 0;
      var MAX_INITIAL_SCANS = 3;

      function wsScanAndConnect() {
        if (isScanning) return;
        isScanning = true;

        var portsToTry = [];
        for (var p = WS_PORT_RANGE_START; p <= WS_PORT_RANGE_END; p++) {
          if (!isPortConnected(p)) portsToTry.push(p);
        }

        if (portsToTry.length === 0) { isScanning = false; return; }
        console.log('[MCP Bridge] Scanning ports ' + WS_PORT_RANGE_START + '-' + WS_PORT_RANGE_END + ' for MCP servers...');

        var foundAny = false;
        var pending = portsToTry.length;

        portsToTry.forEach(function(port) {
          try {
            var testWs = new WebSocket('ws://localhost:' + port);
            var timeout = setTimeout(function() { if (testWs.readyState !== 1) testWs.close(); }, 3000);

            testWs.onopen = function() {
              clearTimeout(timeout);
              foundAny = true;
              activeConnections.push({ port: port, ws: testWs });
              updateCompatState();
              console.log('[MCP Bridge] WebSocket connected to port ' + port + ' (' + activeConnections.length + ' server(s) total)');
              attachWsHandlers(testWs, port);
              initializeConnection(testWs, port);
              pending--;
              if (pending <= 0) { isScanning = false; wsReconnectDelay = 500; wsReconnectAttempts = 0; }
            };

            testWs.onerror = function() { clearTimeout(timeout); };

            testWs.onclose = function() {
              clearTimeout(timeout);
              pending--;
              if (pending <= 0) {
                isScanning = false;
                if (!foundAny && activeConnections.length === 0) {
                  initialScanAttempts++;
                  if (initialScanAttempts < MAX_INITIAL_SCANS) {
                    var delay = 3000 * initialScanAttempts;
                    console.log('[MCP Bridge] No servers found, retry ' + initialScanAttempts + '/' + MAX_INITIAL_SCANS + ' in ' + (delay/1000) + 's');
                    setTimeout(wsScanAndConnect, delay);
                  } else {
                    console.log('[MCP Bridge] No MCP servers found after ' + MAX_INITIAL_SCANS + ' scans. Restart plugin to retry.');
                  }
                }
              }
            };
          } catch (e) { pending--; }
        });
      }

      function wsReconnectPort(port) {
        try {
          var testWs = new WebSocket('ws://localhost:' + port);
          var timeout = setTimeout(function() { if (testWs.readyState !== 1) testWs.close(); }, 2000);

          testWs.onopen = function() {
            clearTimeout(timeout);
            activeConnections.push({ port: port, ws: testWs });
            updateCompatState();
            console.log('[MCP Bridge] Reconnected to port ' + port + ' (' + activeConnections.length + ' server(s) total)');
            attachWsHandlers(testWs, port);
            initializeConnection(testWs, port);
          };

          testWs.onerror = function() { clearTimeout(timeout); };
        } catch (e) {}
      }

      function attachWsHandlers(activeWs, port) {
        activeWs.onmessage = function(event) {
          try {
            var message = JSON.parse(event.data);

            if (message.type === 'SERVER_HELLO' && message.data) {
              console.log('[MCP Bridge] Connected to server on port ' + message.data.port + ' (PID: ' + message.data.pid + ', v' + message.data.serverVersion + ')');
              var conn = activeConnections.find(function(c) { return c.ws === activeWs; });
              if (conn) conn.serverInfo = message.data;
              return;
            }

            if (!message.id || !message.method) {
              console.log('[MCP Bridge] WS:' + port + ': Ignoring malformed message');
              return;
            }

            var handler = methodMap[message.method];
            if (!handler) {
              activeWs.send(JSON.stringify({ id: message.id, error: 'Unknown method: ' + message.method }));
              return;
            }

            Promise.resolve(handler(message.params || {}))
              .then(function(result) {
                if (activeWs.readyState === 1) activeWs.send(JSON.stringify({ id: message.id, result: result }));
              })
              .catch(function(err) {
                if (activeWs.readyState === 1) activeWs.send(JSON.stringify({ id: message.id, error: err.message || String(err) }));
              });
          } catch (e) {
            console.error('[MCP Bridge] WS:' + port + ': Failed to process message:', e);
          }
        };

        activeWs.onclose = function(event) {
          removeConnection(port);
          console.log('[MCP Bridge] WebSocket disconnected from port ' + port + ' (' + activeConnections.length + ' server(s) remaining)');

          var wasReplaced = (event.code === 1000 && (
            event.reason === 'Replaced by new connection' ||
            event.reason === 'Replaced by same file reconnection'
          ));
          if (wasReplaced) {
            console.log('[MCP Bridge] WebSocket:' + port + ': replaced by newer connection, stopping reconnect');
            return;
          }

          wsReconnectAttempts++;
          if (wsReconnectAttempts <= 5) {
            var delay = Math.min(1000 * wsReconnectAttempts, 5000);
            setTimeout(function() { wsReconnectPort(port); }, delay);
          }
        };

        activeWs.onerror = function() {};
      }

      function broadcastToAll(message) {
        var json = JSON.stringify(message);
        activeConnections.forEach(function(conn) {
          if (conn.ws.readyState === 1) {
            try { conn.ws.send(json); } catch(e) {}
          }
        });
      }

      window.__wsForwardVariables = function(data) {
        if (wsConnected) broadcastToAll({ type: 'VARIABLES_DATA', data: data });
      };

      window.__wsForwardDocumentChange = function(data) {
        if (wsConnected) broadcastToAll({ type: 'DOCUMENT_CHANGE', data: data });
      };

      window.__wsForwardConsoleCapture = function(data) {
        if (wsConnected) broadcastToAll({ type: 'CONSOLE_CAPTURE', data: data });
      };

      window.__wsForwardSelectionChange = function(data) {
        if (wsConnected) broadcastToAll({ type: 'SELECTION_CHANGE', data: data });
      };

      window.__wsForwardPageChange = function(data) {
        if (wsConnected) broadcastToAll({ type: 'PAGE_CHANGE', data: data });
      };

      wsScanAndConnect();
    })();

    // ============================================================================
    // MESSAGE HANDLER - Process responses from plugin worker
    // ============================================================================
    window.onmessage = (event) => {
      const msg = event.data.pluginMessage;
      if (!msg) return;

      // Generic result handler
      const handleResult = (resultType, dataKey) => {
        const request = window.__figmaPendingRequests.get(msg.requestId);
        if (request) {
          if (request.timeoutId) clearTimeout(request.timeoutId);
          if (msg.success) {
            var result = { success: true };
            if (dataKey && msg[dataKey] !== undefined) result[dataKey] = msg[dataKey];
            if (msg.data !== undefined) result.data = msg.data;
            if (msg.oldName !== undefined) result.oldName = msg.oldName;
            if (msg.instance !== undefined) result.instance = msg.instance;
            request.resolve(result);
          } else {
            request.resolve({ success: false, error: msg.error || 'Unknown error' });
          }
          window.__figmaPendingRequests.delete(msg.requestId);
        }
      };

      // Handle message types
      switch (msg.type) {
        // ── Bridge messages ──────────────────────────────────────────────────
        case 'VARIABLES_DATA':
          window.__figmaVariablesData = msg.data;
          window.__figmaVariablesReady = true;
          updateStatus('ready', true, false);
          console.log('[MCP Bridge] Active - ' + (msg.data.variables?.length || 0) + ' vars');
          if (window.__wsForwardVariables) window.__wsForwardVariables(msg.data);
          break;

        case 'COMPONENT_DATA':
          window.__figmaComponentData = msg.data;
          var req = window.__figmaComponentRequests.get(msg.requestId);
          if (req) { req.resolve(msg.data); window.__figmaComponentRequests.delete(msg.requestId); }
          break;

        case 'COMPONENT_ERROR':
          var req2 = window.__figmaComponentRequests.get(msg.requestId);
          if (req2) { req2.reject(new Error(msg.error)); window.__figmaComponentRequests.delete(msg.requestId); }
          break;

        case 'ERROR':
          window.__figmaVariablesReady = false;
          updateStatus('error', false, true);
          console.error('[MCP Bridge] Error:', msg.error);
          break;

        case 'EXECUTE_CODE_RESULT':          handleResult('EXECUTE_CODE', 'result'); break;
        case 'UPDATE_VARIABLE_RESULT':       handleResult('UPDATE_VARIABLE', 'variable'); break;
        case 'CREATE_VARIABLE_RESULT':       handleResult('CREATE_VARIABLE', 'variable'); break;
        case 'CREATE_VARIABLE_COLLECTION_RESULT': handleResult('CREATE_VARIABLE_COLLECTION', 'collection'); break;
        case 'DELETE_VARIABLE_RESULT':       handleResult('DELETE_VARIABLE', 'deleted'); break;
        case 'DELETE_VARIABLE_COLLECTION_RESULT': handleResult('DELETE_VARIABLE_COLLECTION', 'deleted'); break;
        case 'REFRESH_VARIABLES_RESULT':     handleResult('REFRESH_VARIABLES', null); break;
        case 'RENAME_VARIABLE_RESULT':       handleResult('RENAME_VARIABLE', 'variable'); break;
        case 'SET_VARIABLE_DESCRIPTION_RESULT': handleResult('SET_VARIABLE_DESCRIPTION', 'variable'); break;
        case 'ADD_MODE_RESULT':              handleResult('ADD_MODE', 'collection'); break;
        case 'RENAME_MODE_RESULT':           handleResult('RENAME_MODE', 'collection'); break;
        case 'GET_LOCAL_COMPONENTS_RESULT':  handleResult('GET_LOCAL_COMPONENTS', null); break;
        case 'INSTANTIATE_COMPONENT_RESULT': handleResult('INSTANTIATE_COMPONENT', 'instance'); break;
        case 'SET_NODE_DESCRIPTION_RESULT':  handleResult('SET_NODE_DESCRIPTION', 'node'); break;
        case 'ADD_COMPONENT_PROPERTY_RESULT': handleResult('ADD_COMPONENT_PROPERTY', 'propertyName'); break;
        case 'EDIT_COMPONENT_PROPERTY_RESULT': handleResult('EDIT_COMPONENT_PROPERTY', 'propertyName'); break;
        case 'DELETE_COMPONENT_PROPERTY_RESULT': handleResult('DELETE_COMPONENT_PROPERTY', null); break;
        case 'RESIZE_NODE_RESULT':           handleResult('RESIZE_NODE', 'node'); break;
        case 'MOVE_NODE_RESULT':             handleResult('MOVE_NODE', 'node'); break;
        case 'SET_NODE_FILLS_RESULT':        handleResult('SET_NODE_FILLS', 'node'); break;
        case 'SET_NODE_STROKES_RESULT':      handleResult('SET_NODE_STROKES', 'node'); break;
        case 'SET_NODE_OPACITY_RESULT':      handleResult('SET_NODE_OPACITY', 'node'); break;
        case 'SET_NODE_CORNER_RADIUS_RESULT': handleResult('SET_NODE_CORNER_RADIUS', 'node'); break;
        case 'CLONE_NODE_RESULT':            handleResult('CLONE_NODE', 'node'); break;
        case 'DELETE_NODE_RESULT':           handleResult('DELETE_NODE', 'deleted'); break;
        case 'RENAME_NODE_RESULT':           handleResult('RENAME_NODE', 'node'); break;
        case 'SET_TEXT_CONTENT_RESULT':      handleResult('SET_TEXT_CONTENT', 'node'); break;
        case 'CREATE_CHILD_NODE_RESULT':     handleResult('CREATE_CHILD_NODE', 'node'); break;
        case 'CAPTURE_SCREENSHOT_RESULT':    handleResult('CAPTURE_SCREENSHOT', 'image'); break;
        case 'SET_INSTANCE_PROPERTIES_RESULT': handleResult('SET_INSTANCE_PROPERTIES', 'instance'); break;
        case 'GET_FILE_INFO_RESULT':         handleResult('GET_FILE_INFO', 'fileInfo'); break;
        case 'RELOAD_UI_RESULT':             handleResult('RELOAD_UI', null); break;

        case 'DOCUMENT_CHANGE':
          if (window.__wsForwardDocumentChange) window.__wsForwardDocumentChange(msg.data);
          break;
        case 'CONSOLE_CAPTURE':
          if (window.__wsForwardConsoleCapture) window.__wsForwardConsoleCapture(msg);
          break;
        case 'SELECTION_CHANGE':
          if (window.__wsForwardSelectionChange) window.__wsForwardSelectionChange(msg.data);
          break;
        case 'PAGE_CHANGE':
          if (window.__wsForwardPageChange) window.__wsForwardPageChange(msg.data);
          break;

        // ── Pipeline messages ────────────────────────────────────────────────
        case 'PIPELINE_INIT':
          pipelineUpdateTarget(msg.data && msg.data.nodes, msg.data && msg.data.page);
          break;

        case 'PIPELINE_SELECTION_CHANGE':
          pipelineUpdateTarget(msg.data && msg.data.nodes, msg.data && msg.data.page);
          break;

        case 'PIPELINE_SUBMIT_RESULT':
          document.getElementById('submit-btn').disabled = false;
          document.getElementById('submit-btn').textContent = 'Submit';
          if (msg.success) {
            showToast('Queued: ' + (pipelineState.nodeName || 'node'), 'success');
            document.getElementById('instruction').value = '';
            document.getElementById('constraints').value = '';
            pipelineSyncSubmit();
            pipelineScanQueue();
          } else {
            showToast(msg.error || 'Submit failed', 'error');
          }
          break;

        case 'PIPELINE_SCAN_QUEUE_RESULT':
          renderQueue((msg.data && msg.data.items) || []);
          break;

        case 'PIPELINE_CLEAR_RESULT':
          renderQueue([]);
          showToast('Queue cleared', 'success');
          break;
      }
    };

    // ============================================================================
    // PIPELINE UI STATE
    // ============================================================================
    var pipelineState = { nodeId: null, nodeName: null, nodeType: null, intent: 'iterate' };

    var NODE_ICONS = {
      FRAME: '▢', SECTION: '⬜', COMPONENT: '◈', COMPONENT_SET: '◈',
      INSTANCE: '◇', TEXT: 'T', RECTANGLE: '▬', ELLIPSE: '○',
      GROUP: '⬡', VECTOR: '✦', LINE: '—', POLYGON: '△', STAR: '★'
    };

    function nodeIcon(type) { return NODE_ICONS[type] || '◻'; }

    function pipelineUpdateTarget(nodes, page) {
      var empty  = document.getElementById('target-empty');
      var icon   = document.getElementById('target-icon');
      var info   = document.getElementById('target-info');
      var nameEl = document.getElementById('target-name');
      var metaEl = document.getElementById('target-meta');

      if (!nodes || nodes.length === 0) {
        pipelineState.nodeId = null;
        empty.style.display = ''; icon.style.display = 'none'; info.style.display = 'none';
        pipelineSyncSubmit(); return;
      }

      var node = nodes[0];
      pipelineState.nodeId   = node.id;
      pipelineState.nodeName = node.name;
      pipelineState.nodeType = node.type;

      empty.style.display = 'none';
      icon.style.display  = '';
      info.style.display  = '';
      icon.textContent    = nodeIcon(node.type);
      nameEl.textContent  = node.name;
      metaEl.textContent  = node.type + ' · ' + (page || '')
        + (nodes.length > 1 ? ' +' + (nodes.length - 1) + ' more' : '');

      pipelineSyncSubmit();
    }

    function pipelineSyncSubmit() {
      var txt = document.getElementById('instruction').value.trim();
      document.getElementById('submit-btn').disabled = !(pipelineState.nodeId && txt.length > 0);
    }

    function showToast(msg, type) {
      var el = document.getElementById('toast');
      el.textContent = msg;
      el.className = 'toast ' + (type || 'success');
      el.style.display = 'block';
      setTimeout(function() { el.style.display = 'none'; }, 3500);
    }

    function pipelineScanQueue() {
      parent.postMessage({ pluginMessage: { type: 'PIPELINE_SCAN_QUEUE' } }, '*');
    }

    function renderQueue(targets) {
      var list  = document.getElementById('queue-list');
      var empty = document.getElementById('queue-empty');

      // Remove all existing queue items (keep the empty placeholder)
      var items = list.querySelectorAll('.queue-item');
      items.forEach(function(el) { el.remove(); });

      if (!targets || targets.length === 0) {
        empty.style.display = '';
        return;
      }

      empty.style.display = 'none';

      targets.forEach(function(t) {
        var item = document.createElement('div');
        item.className = 'queue-item';

        var dot = document.createElement('div');
        dot.className = 'queue-status-dot ' + (t.status || 'pending');

        var infoDiv = document.createElement('div');
        infoDiv.className = 'queue-item-info';

        var nameDiv = document.createElement('div');
        nameDiv.className = 'queue-item-name';
        nameDiv.textContent = t.nodeName || t.nodeId;

        var metaDiv = document.createElement('div');
        metaDiv.className = 'queue-item-meta';
        var parts = [];
        if (t.intent) parts.push(t.intent);
        if (t.instruction) parts.push(t.instruction.length > 40 ? t.instruction.slice(0, 40) + '…' : t.instruction);
        metaDiv.textContent = parts.join(' · ');

        infoDiv.appendChild(nameDiv);
        infoDiv.appendChild(metaDiv);
        item.appendChild(dot);
        item.appendChild(infoDiv);
        list.appendChild(item);
      });
    }

    // Intent pills
    document.getElementById('intent-row').addEventListener('click', function(e) {
      var btn = e.target.closest('.intent-btn');
      if (!btn) return;
      document.querySelectorAll('.intent-btn').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      pipelineState.intent = btn.dataset.intent;
    });

    // Instruction input
    document.getElementById('instruction').addEventListener('input', function() {
      pipelineSyncSubmit();
    });

    // Submit
    document.getElementById('submit-btn').addEventListener('click', function() {
      var instruction = document.getElementById('instruction').value.trim();
      var constraints = document.getElementById('constraints').value.trim() || null;
      if (!pipelineState.nodeId || !instruction) return;
      var btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.textContent = 'Submitting…';
      parent.postMessage({ pluginMessage: {
        type:        'PIPELINE_SUBMIT',
        nodeId:      pipelineState.nodeId,
        instruction: instruction,
        intent:      pipelineState.intent,
        constraints: constraints
      }}, '*');
    });

    // Cancel
    document.getElementById('cancel-btn').addEventListener('click', function() {
      parent.postMessage({ pluginMessage: { type: 'PIPELINE_CLOSE' } }, '*');
    });

    // Queue toggle
    var queueVisible = true;
    document.getElementById('queue-header').addEventListener('click', function() {
      queueVisible = !queueVisible;
      document.getElementById('queue-list').style.display = queueVisible ? '' : 'none';
      document.getElementById('queue-toggle').textContent = queueVisible ? '▾ hide' : '▸ show';
    });

    // Load initial state on open
    parent.postMessage({ pluginMessage: { type: 'PIPELINE_INIT_REQUEST' } }, '*');
    pipelineScanQueue();

    // Auto-refresh queue every 5s so done/failed status from pipeline runs appears
    setInterval(pipelineScanQueue, 5000);
  </script>
</body>
</html>
